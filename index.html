<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Hub</title>
    <style>
        :root {
            --bg-uk: url('https://upload.wikimedia.org/wikipedia/commons/thumb/a/a5/Flag_of_the_United_Kingdom_%281-2%29.svg/1200px-Flag_of_the_United_Kingdom_%281-2%29.svg.png');
            --bg-usa: url('https://www.visittheusa.fr/sites/default/files/styles/16_9_770x433/public/images/hero_media_image/2017-06/1ea456ae0320feb241ca5a977704daa7.jpeg?itok=IlWUWY1v');
            --bg-nyc: url('https://www.visittheusa.fr/sites/default/files/styles/16_9_770x433/public/images/hero_media_image/2017-06/187c45a43c9b2f58963f764e3485ac64.jpeg?itok=36VA77rO');
            --nav-bg: #111;
            --border-green: #2ecc71;
            --accent-yellow: #f1c40f;
            --wheel-rotation: 0deg;
            --bg-brightness: 0.6;
        }

        body { 
            margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center;
            background-image: linear-gradient(rgba(0,0,0,var(--bg-brightness)), rgba(0,0,0,var(--bg-brightness))), var(--bg-uk);
            background-size: cover; background-position: center; background-repeat: no-repeat; background-attachment: fixed;
            font-family: 'Segoe UI', sans-serif; color: white; overflow-x: hidden;
            transition: background 0.8s ease-in-out;
        }

        nav {
            width: 100%; background: var(--nav-bg); 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 10px 30px; box-sizing: border-box; border-bottom: 2px solid #333;
        }

        .nav-left { display: flex; align-items: center; gap: 20px; }
        
        /* Suppression du style gk-logo car on l'enlève */

        .brightness-box { display: flex; align-items: center; gap: 8px; }
        #brightnessSlider { cursor: pointer; height: 5px; width: 80px; }

        .tab-group { display: flex; gap: 10px; }
        .tab { padding: 8px 20px; cursor: pointer; font-weight: bold; border-radius: 8px; background: #222; color: white; border: 1px solid #444; }
        .tab.active { background: var(--border-green); border-color: var(--border-green); }

        .timer-controls { display: flex; align-items: center; gap: 10px; }
        #timer-display { font-family: monospace; font-size: 32px; color: var(--accent-yellow); font-weight: bold; }

        .header { margin-top: 15px; text-align: center; width: 100%; display: flex; flex-direction: column; align-items: center; }
        #date-display { font-size: 18px; background: rgba(0,0,0,0.7); padding: 5px 20px; border-radius: 20px; margin-bottom: 10px; }
        #activity-input { width: 50%; padding: 10px; font-size: 24px; font-weight: bold; text-align: center; border: 3px solid var(--border-green); border-radius: 10px; outline: none; background: white; color: black; }

        .section { display: none; width: 100%; justify-content: center; align-items: center; margin-top: 20px; }
        .visible { display: flex !important; }

        .clock-wrapper { position: relative; width: 380px; height: 380px; display: flex; justify-content: center; align-items: center; }
        #progress-ring { position: absolute; transform: rotate(-90deg); }
        #progress-ring circle { fill: transparent; stroke: var(--border-green); stroke-width: 10; stroke-dasharray: 1130; stroke-dashoffset: 0; stroke-linecap: round; }
        
        #analog { width: 320px; height: 320px; background: white; border-radius: 50%; position: relative; border: 8px solid #222; color: black; }
        .hand { position: absolute; bottom: 50%; left: 50%; transform-origin: bottom; background: #222; transform: translateX(-50%); border-radius: 10px; }
        .hour { width: 8px; height: 70px; } .min { width: 6px; height: 100px; } .sec { width: 2px; height: 115px; background: #e74c3c; }
        .number { position: absolute; width: 100%; height: 100%; text-align: center; font-size: 20px; font-weight: bold; padding: 10px; box-sizing: border-box; }

        .wheel-container { display: flex; gap: 30px; background: rgba(0,0,0,0.5); padding: 20px; border-radius: 20px; }
        .wheel-box { position: relative; width: 400px; height: 400px; border: 8px solid white; border-radius: 50%; overflow: hidden; background: white; transform: rotate(var(--wheel-rotation)); transition: transform 5s cubic-bezier(0.1, 0, 0.1, 1); }
        .pointer { position: absolute; top: -5px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 30px solid #e74c3c; z-index: 10; }
        .editor-panel { background: rgba(20,20,20,0.9); padding: 15px; border-radius: 15px; border: 2px solid var(--border-green); width: 220px; display: flex; flex-direction: column; }
        #names-list { width: 100%; height: 250px; background: #000; color: #fff; border: 1px solid #444; padding: 5px; resize: none; }
        .btn-spin { margin-top: 10px; padding: 10px; font-size: 18px; font-weight: bold; background: #e67e22; color: white; border: none; border-radius: 20px; cursor: pointer; }

        .mute-control { position: fixed; bottom: 20px; left: 20px; }
        .btn-circle { width: 50px; height: 50px; border-radius: 50%; border: 2px solid white; background: rgba(0,0,0,0.8); color: white; cursor: pointer; font-size: 20px; }
        #result-display { font-size: 30px; color: var(--accent-yellow); font-weight: bold; margin-top: 5px; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
    </style>
</head>
<body>

    <nav>
        <div class="nav-left">
            <select id="themeChoice" onchange="changeTheme()" style="padding:5px; border-radius:5px; font-weight:bold; cursor:pointer;">
                <option value="uk">🇬🇧 GB UK</option>
                <option value="usa">🏛️ USA</option>
                <option value="nyc">🗽 NYC</option>
            </select>

            <div class="brightness-box">
                <span>🔅</span>
                <input type="range" id="brightnessSlider" min="0" max="0.9" step="0.1" value="0.6" oninput="updateBrightness(this.value)">
                <span>🌙</span>
            </div>
        </div>

        <div class="tab-group">
            <button id="t-clock" class="tab active" onclick="switchTab('clock', this)">CLOCK</button>
            <button id="t-wheel" class="tab" onclick="switchTab('wheel', this)">WHEEL</button>
        </div>

        <div class="timer-controls">
            <span id="timer-display">00:00</span>
            <input type="number" id="timerInput" value="5" style="width:40px; padding:5px; border-radius:5px; text-align:center;">
            <button onclick="startTimer()" style="background:#2ecc71; color:white; border:none; padding:8px 12px; border-radius:5px; cursor:pointer; font-weight:bold;">START</button>
            <button onclick="stopTimer()" style="background:#e74c3c; color:white; border:none; padding:8px 12px; border-radius:5px; cursor:pointer; font-weight:bold;">STOP</button>
        </div>
    </nav>

    <div class="header">
        <div id="date-display">...</div>
        <input type="text" id="activity-input" placeholder="TYPE ACTIVITY NAME HERE">
        <div id="result-display"></div>
    </div>

    <div class="mute-control"><button class="btn-circle" onclick="toggleMute()" id="muteBtn">🔊</button></div>

    <div id="section-clock" class="section visible">
        <div class="clock-wrapper">
            <svg id="progress-ring" width="360" height="360"><circle cx="180" cy="180" r="170"></circle></svg>
            <div id="analog">
                <div class="number" style="transform: rotate(30deg);"><span style="display:inline-block; transform: rotate(-30deg);">1</span></div>
                <div class="number" style="transform: rotate(60deg);"><span style="display:inline-block; transform: rotate(-60deg);">2</span></div>
                <div class="number" style="transform: rotate(90deg);"><span style="display:inline-block; transform: rotate(-90deg);">3</span></div>
                <div class="number" style="transform: rotate(120deg);"><span style="display:inline-block; transform: rotate(-120deg);">4</span></div>
                <div class="number" style="transform: rotate(150deg);"><span style="display:inline-block; transform: rotate(-150deg);">5</span></div>
                <div class="number" style="transform: rotate(180deg);"><span style="display:inline-block; transform: rotate(-180deg);">6</span></div>
                <div class="number" style="transform: rotate(210deg);"><span style="display:inline-block; transform: rotate(-210deg);">7</span></div>
                <div class="number" style="transform: rotate(240deg);"><span style="display:inline-block; transform: rotate(-240deg);">8</span></div>
                <div class="number" style="transform: rotate(270deg);"><span style="display:inline-block; transform: rotate(-270deg);">9</span></div>
                <div class="number" style="transform: rotate(300deg);"><span style="display:inline-block; transform: rotate(-300deg);">10</span></div>
                <div class="number" style="transform: rotate(330deg);"><span style="display:inline-block; transform: rotate(-330deg);">11</span></div>
                <div class="number" style="transform: rotate(0deg);">12</div>
                <div id="h-hand" class="hand hour"></div>
                <div id="min-hand" class="hand min"></div>
                <div id="sec-hand" class="hand sec"></div>
            </div>
        </div>
    </div>

    <div id="section-wheel" class="section">
        <div class="wheel-container">
            <div style="position:relative;">
                <div class="pointer"></div>
                <div id="wheel-obj" class="wheel-box"><canvas id="canvas-wheel" width="500" height="500" style="width:100%; height:100%;"></canvas></div>
            </div>
            <div class="editor-panel">
                <textarea id="names-list" oninput="updateWheelData()">Antonin&#10;Marley&#10;Jules&#10;Jeremy&#10;Youri&#10;Romane&#10;Johan&#10;Mehdi&#10;Thomas&#10;Evan&#10;Tom&#10;Leo&#10;Fabien&#10;Yovann&#10;Ethan&#10;Ilona</textarea>
                <button class="btn-spin" onclick="spinWheel()">SPIN!</button>
            </div>
        </div>
    </div>

    <audio id="tictac" loop><source src="https://www.soundjay.com/clock/clock-ticking-4.mp3"></audio>
    <audio id="alarm"><source src="https://www.soundjay.com/mechanical/sounds/fire-alarm-1.mp3"></audio>

    <script>
        let students = [], currentRotation = 0, isSpinning = false, timerInterval;
        let totalTime = 0, remainingTime = 0, isMuted = false;
        const colors = ["#e74c3c", "#3498db", "#f1c40f", "#2ecc71", "#9b59b6", "#e67e22", "#1abc9c", "#d35400"];

        function updateBrightness(val) { document.documentElement.style.setProperty('--bg-brightness', val); changeTheme(); }
        
        function switchTab(mode, el) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('section-clock').classList.toggle('visible', mode === 'clock');
            document.getElementById('section-wheel').classList.toggle('visible', mode === 'wheel');
            document.getElementById('activity-input').style.display = (mode === 'wheel') ? 'none' : 'block';
        }

        function changeTheme() { 
            const selected = document.getElementById('themeChoice').value; 
            const themes = { uk: "var(--bg-uk)", usa: "var(--bg-usa)", nyc: "var(--bg-nyc)" }; 
            const br = document.documentElement.style.getPropertyValue('--bg-brightness') || 0.6;
            document.body.style.backgroundImage = `linear-gradient(rgba(0,0,0,${br}), rgba(0,0,0,${br})), ${themes[selected]}`; 
        }

        function toggleMute() { isMuted = !isMuted; document.getElementById('muteBtn').innerText = isMuted ? "🔇" : "🔊"; }
        
        function startTimer() {
            clearInterval(timerInterval);
            totalTime = (parseInt(document.getElementById('timerInput').value) || 0) * 60;
            remainingTime = totalTime;
            if(remainingTime <= 0) return;
            if(!isMuted) document.getElementById('tictac').play().catch(()=>{});
            timerInterval = setInterval(() => {
                remainingTime--; updateTimerDisplay();
                if(remainingTime <= 0) { 
                    clearInterval(timerInterval); 
                    document.getElementById('tictac').pause(); 
                    document.getElementById('alarm').play();
                }
            }, 1000);
        }

        function stopTimer() { clearInterval(timerInterval); document.getElementById('tictac').pause(); remainingTime = 0; updateTimerDisplay(); }

        function updateTimerDisplay() {
            let m = Math.floor(remainingTime / 60), s = remainingTime % 60;
            document.getElementById('timer-display').innerText = `${m<10?'0':''}${m}:${s<10?'0':''}${s}`;
            const circle = document.querySelector('#progress-ring circle');
            const offset = 1130 - (remainingTime / (totalTime || 1)) * 1130;
            circle.style.strokeDashoffset = offset;
        }

        function updateWheelData() {
            students = document.getElementById('names-list').value.split('\n').filter(n => n.trim() !== "");
            const canvas = document.getElementById('canvas-wheel'), ctx = canvas.getContext('2d');
            ctx.clearRect(0,0,500,500); const arc = (Math.PI * 2) / students.length;
            students.forEach((name, i) => {
                ctx.fillStyle = colors[i % colors.length]; ctx.beginPath(); ctx.moveTo(250,250); ctx.arc(250,250,250, i*arc, (i+1)*arc); ctx.fill();
                ctx.save(); ctx.translate(250,250); ctx.rotate(i*arc + arc/2);
                ctx.fillStyle = "white"; ctx.font = "bold 18px Arial"; ctx.textAlign = "right"; ctx.fillText(name, 230, 8); ctx.restore();
            });
        }

        function spinWheel() {
            if(isSpinning || students.length === 0) return;
            isSpinning = true; document.getElementById('result-display').innerText = "...";
            const deg = Math.floor(Math.random() * 360) + 3600;
            currentRotation += deg; document.documentElement.style.setProperty('--wheel-rotation', `${currentRotation}deg`);
            setTimeout(() => {
                isSpinning = false;
                const actualDeg = currentRotation % 360; const arcDeg = 360 / students.length;
                const idx = Math.floor(((360 - actualDeg + 270) % 360) / arcDeg);
                document.getElementById('result-display').innerText = "⭐ " + students[idx] + " ⭐";
            }, 5000);
        }

        function updateClock() {
            const now = new Date();
            document.getElementById('date-display').innerText = now.toLocaleDateString('en-GB', {weekday:'long', day:'numeric', month:'long'});
            const h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
            document.getElementById('sec-hand').style.transform = `translateX(-50%) rotate(${s*6}deg)`;
            document.getElementById('min-hand').style.transform = `translateX(-50%) rotate(${m*6}deg)`;
            document.getElementById('h-hand').style.transform = `translateX(-50%) rotate(${h*30 + m*0.5}deg)`;
        }
        
        setInterval(updateClock, 1000); updateWheelData(); updateClock();
    </script>
</body>
</html>
